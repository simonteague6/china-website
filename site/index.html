<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0d0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>China 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Top bar -->
  <header class="topbar" id="topbar">
    <span class="topbar-title">China 2026</span>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span>
    </button>
  </header>

  <!-- Side drawer -->
  <aside class="drawer" id="drawer">
    <div class="drawer-inner">
      <nav class="drawer-nav">
        <button class="drawer-link active" data-view="ideas">Ideas</button>
        <button class="drawer-link" data-view="logistics">Logistics</button>
      </nav>
      <div class="drawer-footer">
        <p>May 18 – Jun 1, 2026</p>
      </div>
    </div>
  </aside>
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- Ideas view -->
  <main class="view active" id="view-ideas">
    <!-- City filter pills -->
    <nav class="city-filters" id="city-filters">
      <button class="city-pill active" data-city="all">All</button>
    </nav>
    <!-- Idea cards feed -->
    <div class="idea-feed" id="idea-feed"></div>
  </main>

  <!-- Logistics view -->
  <main class="view" id="view-logistics">
    <div class="logistics-content" id="logistics-content"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
